baseURL = "https://allene-ha.github.io/"
title = "Allene Ha"
paginate = 10
defaultContentLanguage = "ko"
defaultContentLanguageInSubdir = false

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true
theme = "PaperMod"

[minify]
disableXML = true
minifyOutput = true

# ── 다국어 설정 ──────────────────────────────
[languages]

  [languages.ko]
    languageName = "한국어"
    weight = 1
    title = "Allene Ha"

    [languages.ko.params]
      homeInfoParams = { Title = "안녕하세요 👋", Content = "뱅크샐러드 AI팀 DE · 데이터와 AI의 교차점을 탐구합니다" }

    [[languages.ko.menu.main]]
      name = "글 목록"
      url = "/posts/"
      weight = 1
    [[languages.ko.menu.main]]
      name = "태그"
      url = "/tags/"
      weight = 2
    [[languages.ko.menu.main]]
      name = "아카이브"
      url = "/archives/"
      weight = 3
    [[languages.ko.menu.main]]
      name = "검색"
      url = "/search/"
      weight = 4

  [languages.en]
    languageName = "English"
    weight = 2
    title = "Allene Ha"

    [languages.en.params]
      homeInfoParams = { Title = "Hello 👋", Content = "DE at Banksalad AI Team · Exploring the intersection of Data & AI" }

    [[languages.en.menu.main]]
      name = "Posts"
      url = "/posts/"
      weight = 1
    [[languages.en.menu.main]]
      name = "Tags"
      url = "/tags/"
      weight = 2
    [[languages.en.menu.main]]
      name = "Archives"
      url = "/archives/"
      weight = 3
    [[languages.en.menu.main]]
      name = "Search"
      url = "/search/"
      weight = 4

# ── 테마 설정 (PaperMod) ─────────────────────
[params]
  env = "production"
  description = "데이터 엔지니어링, AI, PKM에 대한 블로그"
  author = "Allene Ha"
  DateFormat = "2006-01-02"

  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true

  [params.profileMode]
    enabled = false

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/allene-ha"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/jeongeun-ha"

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  [params.editPost]
    URL = "https://github.com/allene-ha/allene-ha.github.io/tree/main/content"
    Text = "Edit"
    appendFilePath = true

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

# ── SEO / GEO 구조화 데이터 ──────────────────
[params.schema]
  publisherType = "Person"

# ── 출력 포맷 (검색 + RSS) ───────────────────
[outputs]
  home = ["HTML", "RSS", "JSON"]

# ── 마크업 설정 ──────────────────────────────
[markup]
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = true
    lineNos = true
    noClasses = false
    style = "monokai"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
